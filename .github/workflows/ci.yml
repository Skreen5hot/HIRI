name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Allow only one concurrent run per branch. Dev builds don't block main deployments.
concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run spec tests
        run: npm test -- --write-json

      - name: Run kernel purity check
        run: npm run test:purity

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-test-results
          path: unit-test-results.json

      - name: Add test summary
        if: always()
        run: |
          if [ -f unit-test-results.json ]; then
            echo "## Spec Test Results" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            TOTAL=$(jq '.summary.totalFiles' unit-test-results.json)
            PASSED=$(jq '.summary.filesPassed' unit-test-results.json)
            TESTS=$(jq '.summary.totalTests' unit-test-results.json)
            TESTS_PASSED=$(jq '.summary.testsPassed' unit-test-results.json)
            echo "- **Files**: $PASSED/$TOTAL passed" >> $GITHUB_STEP_SUMMARY
            echo "- **Tests**: $TESTS_PASSED/$TESTS passed" >> $GITHUB_STEP_SUMMARY
          fi

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # --- Build main site (root) ---
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build main site
        run: |
          cd main-src
          npm ci
          npm run build
          npm run build:demo

      - name: Prepare main site artifact
        run: |
          mkdir -p _site
          cp main-src/site/*.html _site/
          cp main-src/site/oxigraph-loader.js _site/
          cp main-src/dist/demo.js _site/
          cp main-src/dist/oxigraph-web.js _site/
          cp main-src/dist/web_bg.wasm _site/

      # --- Build dev site (/dev/) ---
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          path: dev-src
        continue-on-error: true

      - name: Build dev site
        id: build-dev
        run: |
          cd dev-src
          npm ci
          npm run build
          npm run build:demo
        continue-on-error: true

      - name: Prepare dev site artifact
        if: steps.build-dev.outcome == 'success'
        run: |
          mkdir -p _site/dev
          cp dev-src/site/*.html _site/dev/
          cp dev-src/site/oxigraph-loader.js _site/dev/
          cp dev-src/dist/demo.js _site/dev/
          cp dev-src/dist/oxigraph-web.js _site/dev/
          cp dev-src/dist/web_bg.wasm _site/dev/

      # --- Deploy combined site ---
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
